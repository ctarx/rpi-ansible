---
- name: Update packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600

- name: Install essential packages
  ansible.builtin.package:
    name: "{{ packages }}"
    state: present

- name: Check whether a reboot is required
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required_file

- name: Reboot the server when required
  ansible.builtin.reboot:
  when: reboot_required_file.stat.exists

- name: Ensure the SSH configuration directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Disable SSH password authentication and root login
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/00-ansible-hardening.conf
    content: |
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PermitRootLogin no
    owner: root
    group: root
    mode: "0644"
    validate: /usr/sbin/sshd -t -f %s
  notify: Reload SSH

- name: Load the SSH hardening configuration first
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: >-
      ^\s*Include\s+/etc/ssh/sshd_config\.d/00-ansible-hardening\.conf\s*$
    line: Include /etc/ssh/sshd_config.d/00-ansible-hardening.conf
    insertbefore: BOF
    validate: /usr/sbin/sshd -t -f %s
  notify: Reload SSH
